<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;touch-action:none}
:root{--yellow:#ffe040;--pink:#ff7eb3;--purple:#9b5fd4;--green:#4dcf8a;--white:#fff}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.topbar{flex-shrink:0;z-index:30;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
  border-bottom:2px solid rgba(255,224,64,.35);padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between}
.topbar-name{font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;color:var(--yellow)}
.topbar-sub{font-size:.62rem;font-weight:700;color:#aac4ff;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-info-top,.btn-back{font-family:'Baloo 2',cursive;font-size:.7rem;font-weight:800;border-radius:999px;padding:6px 14px;cursor:pointer}
.btn-info-top{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:var(--white)}
.btn-back{background:#0f3460;color:var(--yellow);border:2px solid var(--yellow)}
#bg{position:absolute;inset:0;z-index:0;width:100%;height:100%}
.happy-wrap{position:absolute;top:64px;left:50%;transform:translateX(-50%);z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none}
.happy-track{width:130px;height:11px;background:rgba(0,0,0,.4);border-radius:999px;overflow:hidden;border:1.5px solid rgba(255,255,255,.25)}
.happy-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--pink),var(--yellow));transition:width .5s}
.happy-lbl{font-size:.5rem;font-weight:800;color:rgba(255,255,255,.65)}
#lore{position:absolute;top:68px;right:10px;z-index:25;background:rgba(10,5,30,.92);
  border:2px solid rgba(255,224,64,.4);border-radius:14px;padding:12px 14px;width:175px;
  display:none;flex-direction:column;gap:5px;backdrop-filter:blur(6px)}
#lore.show{display:flex}
.lore-title{font-family:'Baloo 2',cursive;font-size:.7rem;color:var(--yellow);font-weight:800}
.lore-desc{font-size:.5rem;color:#aac4ff;line-height:1.6;margin-bottom:4px}
.stat-row{display:flex;align-items:center;gap:5px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.stat-row:last-of-type{border:none}
.stat-name{font-size:.48rem;font-weight:800;color:#888;width:28px}
.stat-bar{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:999px}
.stat-val{font-size:.48rem;font-weight:800;color:var(--yellow);width:20px;text-align:right}
.lore-footer{font-size:.46rem;color:#666;margin-top:4px;line-height:1.7}
#stage{position:absolute;z-index:10;pointer-events:none;transform-origin:center bottom}
#stage svg{overflow:visible;display:block}
#speech{position:absolute;z-index:25;background:var(--white);border:2.5px solid #ddd;
  border-radius:18px 18px 18px 5px;padding:9px 14px;font-size:.78rem;font-weight:800;color:#333;
  max-width:210px;line-height:1.5;box-shadow:0 4px 18px rgba(0,0,0,.28);
  opacity:0;transition:opacity .3s;pointer-events:none}
#speech::after{content:'';position:absolute;bottom:-11px;left:18px;border:6px solid transparent;border-top-color:var(--white)}
#speech.show{opacity:1}
.tray{position:absolute;bottom:0;left:0;right:0;z-index:30;background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px);border-top:2px solid rgba(255,224,64,.25);
  padding:10px 12px 22px;display:flex;flex-direction:column;align-items:center;gap:8px}
.tray-lbl{font-size:.52rem;font-weight:800;color:rgba(255,224,64,.5);letter-spacing:.08em}
.tray-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tool{width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.18);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;cursor:grab;user-select:none;touch-action:none;transition:all .2s}
.tool.on{background:rgba(255,224,64,.18);border-color:var(--yellow);box-shadow:0 0 16px rgba(255,224,64,.35);transform:scale(1.1)}
.ti{font-size:1.7rem;pointer-events:none}
.tl{font-size:.42rem;font-weight:800;color:#aac4ff;pointer-events:none}
#ghost{position:fixed;z-index:200;font-size:2.2rem;pointer-events:none;
  transform:translate(-50%,-50%);opacity:0;transition:opacity .15s;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5))}
#ghost.on{opacity:1}
.sp{position:fixed;pointer-events:none;z-index:199;animation:spAnim .9s ease forwards}
@keyframes spAnim{0%{transform:translate(-50%,-50%) scale(.4);opacity:1}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
.heart{position:fixed;pointer-events:none;z-index:50;animation:heartUp 1.1s ease forwards}
@keyframes heartUp{0%{transform:translateY(0) scale(.5);opacity:1}100%{transform:translateY(-80px) scale(1.4);opacity:0}}
#accPick{
  position:fixed;bottom:148px;left:0;right:0;
  z-index:35;background:rgba(8,4,24,.97);border-top:2px solid var(--yellow);
  border-radius:20px 20px 0 0;padding:12px 12px 18px;display:none;
  flex-direction:column;align-items:center;gap:10px;backdrop-filter:blur(12px);
  max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;

#accPick.show{display:flex}
.acc-title-row{display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 2px}
.acc-title{font-family:'Baloo 2',cursive;font-size:.72rem;color:var(--yellow);font-weight:800}
.btn-clear-all{font-family:'Baloo 2',cursive;font-size:.55rem;font-weight:800;
  background:rgba(255,60,60,.2);border:1.5px solid rgba(255,80,80,.5);
  color:#ff8888;border-radius:999px;padding:4px 12px;cursor:pointer}
.acc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
.acc-opt{
  cursor:pointer;border-radius:12px;border:2px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px 6px;transition:all .18s;position:relative;
}
.acc-opt.on{
  border-color:var(--yellow);background:rgba(255,224,64,.15);
  box-shadow:0 0 12px rgba(255,224,64,.25);
}
.acc-opt.on::after{content:'✓';position:absolute;top:3px;right:5px;
  font-size:.5rem;font-weight:900;color:var(--yellow)}
.acc-opt:active{transform:scale(.9)}
.acc-opt svg{display:block}
.acc-opt-label{font-size:.4rem;font-weight:800;color:#8899cc;text-align:center;
  line-height:1.3;padding:0 2px;}
.acc-opt.on .acc-opt-label{color:var(--yellow)}
.zzz{position:absolute;top:-20px;right:-25px;font-size:1.2rem;z-index:15;
  animation:zzzFloat 1.8s ease-in-out infinite alternate;pointer-events:none}
@keyframes zzzFloat{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-10px) rotate(8deg)}}
/* Accessories are now inline SVG - no floating div needed */
.part{position:absolute;pointer-events:none;z-index:3;font-size:.85rem;opacity:.7;animation:partFloat linear infinite}
@keyframes partFloat{0%{transform:translateY(0) rotate(0deg);opacity:.7}100%{transform:translateY(-50px) rotate(30deg);opacity:0}}
</style>
</head>

function buildGeneric(c='#ffb3d9'){return buildFluffkin(c);}





const BUILDERS = {
  Fluffkin:buildFluffkin, Sparklox:buildSparklox, Puddlum:buildPuddlum,
  Driftail:buildDriftail, Lunabelle:buildLunabelle,
  Glimcat:buildGlimcat, Coraluff:buildCoraluff, Peppin:buildPeppin,
  Starwhirl:buildStarwhirl, Mossling:buildMossling, Twinkow:buildTwinkow,
  Boulbear:buildBoulbear, Zipplet:buildZipplet, Dazzlphin:buildDazzlphin,
  Flameow:buildFlameow, Crystaloo:buildCrystaloo, Dewdrop:buildDewdrop,
  Puffy:buildPuffy, Shimmur:buildShimmur,
};
function getBuilder(name){
  if(BUILDERS[name]) return BUILDERS[name];
  const arch = ARCHETYPE[name];
  return arch ? BUILDERS[arch] : buildGeneric;
}

// ═══════════════════════════════════════════
//  ANIMATION ENGINE
// ═══════════════════════════════════════════
let animT=0, rafId=null, currentName='';

// Blink state
let blinkTimer=90, blinkNext=160, isBlinking=false, blinkFrame=0;
// Fluffkin
let isHopping=false, hopPhase=0, hopTimer=250, earWigglePhase=0;
// Sparklox
let tailWag=0, foxEarPhase=0;
// Puddlum  
let isClapping=false, clapPhase=0, clapTimer=200, rockPhase=0;
// Driftail
let wingFlap=0;
// Lunabelle
let headAngle=0, headDir=1, headTimer=120, tuftPhase=0;

function startAnim(name){
  currentName=name; animT=0;
  blinkTimer=60+Math.random()*100; blinkNext=120+Math.random()*160;
  isHopping=false; hopTimer=180+Math.random()*200;
  isClapping=false; clapTimer=160+Math.random()*180;
  headAngle=0; headTimer=90+Math.random()*90;
  tailWag=0; wingFlap=0; rockPhase=0;
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(al);
}

function el(id){ return document.getElementById(id); }

function al(){
  rafId=requestAnimationFrame(al);
  animT++;
  if(!el('cSvg')) return;
  try{

  // ── BREATHING: body gently expands and contracts ──
  const bg=el('bodyGroup');
  if(bg){
    const breathe=Math.sin(animT*.038)*0.016;
    const breatheX=1-breathe*.4;
    bg.style.transform=`scaleY(${1+breathe}) scaleX(${breatheX})`;
  }

  // ── BLINKING ──
  blinkTimer--;
  if(blinkTimer<=0 && !isBlinking){ isBlinking=true; blinkFrame=0; }
  if(isBlinking){
    blinkFrame++;
    const lidL=el('lidL'), lidR=el('lidR');
    const eyeL=el('eyeL'), eyeR=el('eyeR');
    if(blinkFrame===1){
      // Snap closed
      if(lidL){ lidL.style.display='block'; lidL.setAttribute('ry','11'); }
      if(lidR){ lidR.style.display='block'; lidR.setAttribute('ry','11'); }
      if(eyeL) eyeL.style.filter='brightness(.15)';
      if(eyeR) eyeR.style.filter='brightness(.15)';
    } else if(blinkFrame===4){
      // Half open
      if(lidL) lidL.setAttribute('ry','5');
      if(lidR) lidR.setAttribute('ry','5');
      if(eyeL) eyeL.style.filter='brightness(.5)';
      if(eyeR) eyeR.style.filter='brightness(.5)';
    } else if(blinkFrame===7){
      // Open
      if(lidL) lidL.style.display='none';
      if(lidR) lidR.style.display='none';
      if(eyeL) eyeL.style.filter='';
      if(eyeR) eyeR.style.filter='';
    } else if(blinkFrame===12){
      isBlinking=false;
      blinkTimer=blinkNext;
      blinkNext=140+Math.random()*200;
    }
  }

  // ── EYE MICRO-MOVEMENT: subtle pupil drift via the inner iris elements ──
  if(!isBlinking && animT%4===0){
    const ex=Math.sin(animT*.018)*1.2;
    const ey=Math.sin(animT*.022)*.6;
    // Move just pupils, not whole eye group (avoids transform conflict)
    const pupils=document.querySelectorAll('#cSvg circle[fill="#111"]');
    pupils.forEach(p=>{ p.style.transform=`translate(${ex}px,${ey}px)`; });
  }

  // ── CREATURE-SPECIFIC ANIMATIONS ──
  const arch = ARCHETYPE[currentName];
  const animName = CD[currentName] ? currentName : (arch||'Fluffkin');
  if(animName==='Fluffkin')   animFluffkin();
  else if(animName==='Sparklox') animSparklox();
  else if(animName==='Puddlum')  animPuddlum();
  else if(animName==='Driftail') animDriftail();
  else if(animName==='Lunabelle') animLunabelle();
  }catch(e){ /* suppress per-frame errors */ }
}

// ── FLUFFKIN: ear twitches, tail wag, periodic hops ──
function animFluffkin(){
  earWigglePhase+=.07;
  const earL=el('earL'), earR=el('earR'), tail=el('tail');
  // Independent ear movement — left twitches more
  if(earL) earL.style.transform=`rotate(${Math.sin(earWigglePhase)*6 + Math.sin(animT*.15)*2}deg)`;
  if(earR) earR.style.transform=`rotate(${Math.sin(earWigglePhase+1.4)*4}deg)`;
  // Tail wag
  if(tail) tail.style.transform=`rotate(${Math.sin(animT*.07)*11}deg)`;
  // Hop
  hopTimer--;
  if(hopTimer<=0 && !isHopping){ isHopping=true; hopPhase=0; hopTimer=200+Math.random()*240; }
  if(isHopping){
    hopPhase++;
    const st=el('stage');
    if(st){
      // Arc jump: goes up then comes down with squash on landing
      const progress=hopPhase/22;
      const hy=-Math.sin(progress*Math.PI)*42;
      // Squash at peak, stretch going up
      const sx=progress<.5 ? 1-progress*.08 : 1-(1-progress)*.08;
      const sy=progress<.5 ? 1+progress*.1  : 1+(1-progress)*.1;
      // Landing squash
      const landSX = hopPhase===21 ? 1.18 : hopPhase===22 ? 1.1 : sx;
      const landSY = hopPhase===21 ? .78  : hopPhase===22 ? .88 : sy;
      st.style.transform=`translateY(${hy}px) scaleX(${landSX}) scaleY(${landSY})`;
    }
    if(hopPhase>22){ isHopping=false; if(el('stage')) el('stage').style.transform=''; }
  }
}

// ── SPARKLOX: tail wag with physics, ear flick ──
function animSparklox(){
  tailWag+=.08;
  foxEarPhase+=.05;
  const tail=el('tail'), earL=el('earL'), earR=el('earR');
  // Tail has a slight lag/spring feel via sin + offset
  if(tail){
    const wag=Math.sin(tailWag)*22 + Math.sin(tailWag*2)*.8*4;
    tail.style.transform=`rotate(${wag}deg)`;
  }
  // Occasional ear flick
  const flick=Math.sin(foxEarPhase)*5;
  if(earL) earL.style.transform=`rotate(${flick}deg)`;
  if(earR) earR.style.transform=`rotate(${Math.sin(foxEarPhase+.8)*4}deg)`;
}

// ── PUDDLUM: body rock, flipper sway, clap, tiny bounce ──
function animPuddlum(){
  rockPhase+=.045;
  const flipL=el('flipL'), flipR=el('flipR'), bg=el('bodyGroup');
  const rock=Math.sin(rockPhase)*5;
  // Override body transform to add rock on top of breathing
  if(bg){
    const breathe=Math.sin(animT*.038)*0.016;
    bg.style.transform=`scaleY(${1+breathe}) scaleX(${1-breathe*.4}) rotate(${rock}deg)`;
  }
  clapTimer--;
  if(clapTimer<=0 && !isClapping){ isClapping=true; clapPhase=0; clapTimer=180+Math.random()*180; }
  if(isClapping){
    clapPhase++;
    const ca=Math.sin(clapPhase*.45)*42;
    if(flipL) flipL.style.transform=`rotate(${-ca}deg)`;
    if(flipR) flipR.style.transform=`rotate(${ca}deg)`;
    // Small excited bounce during clap
    const st=el('stage');
    if(st) st.style.transform=`translateY(${-Math.abs(Math.sin(clapPhase*.45))*8}px)`;
    if(clapPhase>28){
      isClapping=false;
      if(flipL) flipL.style.transform='';
      if(flipR) flipR.style.transform='';
      if(el('stage')) el('stage').style.transform='';
    }
  } else {
    // Gentle resting flipper sway
    const sw=Math.sin(animT*.058)*10;
    if(flipL) flipL.style.transform=`rotate(${-sw}deg)`;
    if(flipR) flipR.style.transform=`rotate(${sw}deg)`;
  }
}

// ── DRIFTAIL: wing flap, tail flame sway, occasional stomp ──
function animDriftail(){
  wingFlap+=.068;
  const wingL=el('wingL'), wingR=el('wingR'), tail=el('tail');
  // Wing flap — asymmetric for life
  const fa=Math.sin(wingFlap)*14 + Math.sin(wingFlap*2+.5)*3;
  if(wingL) wingL.style.transform=`rotate(${fa}deg)`;
  if(wingR) wingR.style.transform=`rotate(${-fa}deg)`;
  // Tail sways with gentle flame undulation
  if(tail) tail.style.transform=`rotate(${Math.sin(animT*.042)*10}deg)`;
  // Occasional small stomp - use a flag to prevent stacking
  if(animT%280===0 && !animDriftail._stomping){
    animDriftail._stomping=true;
    const st=el('stage');
    if(st){
      let f=0;
      const iv=setInterval(()=>{
        f++;
        if(f<3) st.style.transform=`translateY(4px) scaleX(1.06) scaleY(.94)`;
        else if(f<6) st.style.transform=`translateY(-6px) scaleX(.96) scaleY(1.06)`;
        else if(f<9) st.style.transform=`translateY(2px)`;
        else { clearInterval(iv); if(st) st.style.transform=''; animDriftail._stomping=false; }
      },50);
    }
  }
}

// ── LUNABELLE: head look-around, tuft sway, halo pulse, wing settle ──
function animLunabelle(){
  tuftPhase+=.055;
  headTimer--;
  if(headTimer<=0){ headDir*=-1; headTimer=70+Math.random()*100; }
  // Smooth angle interpolation
  const targetAngle=headDir*24;
  headAngle+=(targetAngle-headAngle)*.025;

  // Rotate just the head area via full SVG rotation around head center
  const svg=el('cSvg');
  if(svg){ svg.style.transformBox='fill-box'; svg.style.transformOrigin='110px 110px'; svg.style.transform=`rotate(${headAngle*.35}deg)`; }

  const tuftL=el('tuftL'), tuftR=el('tuftR');
  if(tuftL) tuftL.style.transform=`rotate(${Math.sin(tuftPhase)*7}deg)`;
  if(tuftR) tuftR.style.transform=`rotate(${Math.sin(tuftPhase+1)*6}deg)`;

  // Wing settle
  const wingL=el('wingL'), wingR=el('wingR');
  const ws=Math.sin(animT*.038)*5;
  if(wingL) wingL.style.transform=`rotate(${ws}deg)`;
  if(wingR) wingR.style.transform=`rotate(${-ws}deg)`;

  // Moon halo breathe
  const halo=el('moonHalo');
  if(halo){ const p=.22+Math.sin(animT*.048)*.14; halo.setAttribute('stroke',`rgba(255,220,80,${p})`); }
}

function squashStretch(stage, frames){
  // frames: array of [scaleX, scaleY, ms]
  let i=0;
  function next(){
    if(i>=frames.length){ stage.style.transform=''; return; }
    const [sx,sy,ms]=frames[i++];
    stage.style.transform=`scaleX(${sx}) scaleY(${sy})`;
    setTimeout(next,ms);
  }
  next();
}

function reactPet(){
  const st=el('stage'), he=el('heartEyes');
  if(he) he.style.display='block';
  // Big squish (wide/flat) then bounce up (narrow/tall) then settle
  squashStretch(st,[
    [1.22,.78,80],[.92,1.14,80],[1.1,.9,70],[.96,1.06,70],[1.0,1.0,60]
  ]);
  setTimeout(()=>{ if(he) he.style.display='none'; }, 2200);
}

function reactFeed(){
  const mn=el('mn'), mc=el('mc'), st=el('stage');
  if(mn) mn.style.display='none';
  if(mc) mc.style.display='block';
  // Anticipation lean back, then lunge forward to chomp
  let f=0;
  const iv=setInterval(()=>{
    f++;
    if(f<=4){
      // Lean back
      if(st) st.style.transform=`translateX(${-f*2}px) rotate(${-f}deg)`;
    } else if(f<=8){
      // Lunge forward + chomp squash
      if(st) st.style.transform=`translateX(${(f-4)*4}px) scaleX(1.14) scaleY(.86) rotate(2deg)`;
    } else if(f<=14){
      // Chewing bounce
      const chew=Math.sin((f-8)*0.9)*0.06;
      if(st) st.style.transform=`scaleX(${1+chew}) scaleY(${1-chew})`;
    } else if(f<=18){
      // Settle
      if(st) st.style.transform='';
    } else {
      clearInterval(iv);
      if(mn) mn.style.display='block';
      if(mc) mc.style.display='none';
      if(st) st.style.transform='';
    }
  },55);
}

function reactBrush(){
  const st=el('stage');
  // Lean into the brush - tilt one way, blissful
  let f=0;
  const iv=setInterval(()=>{
    f++;
    // Slow lean to right, then left, then settle contentedly
    const angle=Math.sin(f*.28)*12;
    const tx=Math.sin(f*.28)*6;
    if(st) st.style.transform=`rotate(${angle}deg) translateX(${tx}px)`;
    if(f>42){ clearInterval(iv); if(st) st.style.transform=''; }
  },40);
}

function reactCuddle(){
  const st=el('stage');
  // Slow gentle sway then droop down
  let f=0;
  const iv=setInterval(()=>{
    f++;
    if(f<20){
      if(st) st.style.transform=`rotate(${Math.sin(f*.2)*8}deg)`;
    } else {
      // Droop
      const droop=Math.min(1,(f-20)/15);
      if(st) st.style.transform=`rotate(${-5*droop}deg) scaleY(${1-droop*.04})`;
    }
    if(f>35){ clearInterval(iv); }
  },45);
}

      ctx.fillStyle='#c4a96b';ctx.fillRect(0,H*.89,W,H*.11);

      ctx.fillStyle=gl;ctx.fillRect(0,0,W,H);

      const lv=ctx.createRadialGradient(W*.5,H*.21,0,W*.5,H*.21,68);lv.addColorStop(0,'rgba(255,130,0,.92)');lv.addColorStop(.5,'rgba(255,60,0,.55)');lv.addColorStop(1,'transparent');

function drawSun(x,y,r){ctx.fillStyle='#FFE566';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,220,80,.38)';ctx.lineWidth=r*.38;for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*(r+4),y+Math.sin(a)*(r+4));ctx.lineTo(x+Math.cos(a)*(r+13),y+Math.sin(a)*(r+13));ctx.stroke();}}
function drawCloud(x,y,s){ctx.fillStyle='rgba(255,255,255,.87)';[[0,0,s*.42],[s*.32,-s*.18,s*.38],[s*.62,0,s*.32]].forEach(([dx,dy,r])=>{ctx.beginPath();ctx.arc(x+dx,y+dy,r,0,Math.PI*2);ctx.fill();});}
function flower(x,y,c){ctx.fillStyle=c;for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(x+Math.cos(i*60*Math.PI/180)*6.5,y+Math.sin(i*60*Math.PI/180)*6.5,3.5,6.5,i*60*Math.PI/180,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#FFE040';ctx.beginPath();ctx.arc(x,y,3.8,0,Math.PI*2);ctx.fill();}
function coral(x,y,c){ctx.strokeStyle=c;ctx.lineWidth=4.8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-27);ctx.moveTo(x,y-14);ctx.lineTo(x-13,y-29);ctx.moveTo(x,y-14);ctx.lineTo(x+13,y-29);ctx.stroke();}
function mush(x,y,c){ctx.fillStyle='#7a4a20';ctx.fillRect(x-3.8,y-15,7.5,15);ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y-15,17,13,0,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.48)';ctx.beginPath();ctx.arc(x-5,y-19,4.2,0,Math.PI*2);ctx.fill();}
function pine(x,y,c){ctx.fillStyle=c;[[0,-42,15],[0,-27,21],[0,-11,27]].forEach(([dx,dy,r])=>{ctx.beginPath();ctx.moveTo(x+dx-r,y+dy+r);ctx.lineTo(x+dx,y+dy-r);ctx.lineTo(x+dx+r,y+dy+r);ctx.fill();});ctx.fillStyle='#5a3010';ctx.fillRect(x-3.8,y,7.5,11);}

const TOOLS=[{id:'pet',icon:'🤚',lbl:'Pet'},{id:'feed',icon:'🍎',lbl:'Feed'},{id:'brush',icon:'🪮',lbl:'Brush'},{id:'cuddle',icon:'💤',lbl:'Cuddle'},{id:'acc',icon:'🎀',lbl:'Dress Up'}];
const THAPPY={pet:8,feed:15,brush:12,sparkle:12,cuddle:8,acc:10};
const SPARKLE_ICONS=['✨','💫','⭐','🌟','💎'];
const HEART_ICONS={pet:'💕',feed:'⭐',brush:'✨',sparkle:'💎',cuddle:'💤',acc:'🎀'};

let activeTool=null,dragging=false,dX=0,dY=0,lastSpX=-999,lastSpY=-999;

function buildTools(){
  const d=appState.lore,row=document.getElementById('toolsRow');
  row.innerHTML='';
  TOOLS.forEach(t=>{
    let icon=t.icon,lbl=t.lbl;
    if(t.id==='brush'&&!d.furry){icon='✨';lbl='Sparkle';}
    if(t.id==='feed'){icon=d.food;}
    const el=document.createElement('div');
    el.className='tool';el.id='tool_'+t.id;
    el.innerHTML=`<span class="ti">${icon}</span><span class="tl">${lbl}</span>`;
    el.addEventListener('mousedown',e=>startDrag(e,{...t,icon,lbl}));
    el.addEventListener('touchstart',e=>startDrag(e,{...t,icon,lbl}),{passive:false});
    row.appendChild(el);
  });
}

function startDrag(e,tool){
  e.preventDefault();
  getCareCtx(); // unlock audio on first touch
  if(appState.sleeping&&tool.id!=='pet'){speak("Shhh… sleeping! Pet me to wake up 😴");playCareSound('no');return;}
  if(tool.id==='acc'){toggleAcc();return;}
  activeTool=tool;dragging=true;
  const pt=e.touches?e.touches[0]:e;dX=pt.clientX;dY=pt.clientY;
  const g=document.getElementById('ghost');g.textContent=tool.icon;g.style.left=dX+'px';g.style.top=dY+'px';g.classList.add('on');
  document.getElementById('tool_'+tool.id)?.classList.add('on');
}
document.addEventListener('mousemove',mv);document.addEventListener('touchmove',mv,{passive:false});
document.addEventListener('mouseup',up);document.addEventListener('touchend',up);

function mv(e){
  if(!dragging)return;e.preventDefault();
  const pt=e.touches?e.touches[0]:e;dX=pt.clientX;dY=pt.clientY;
  const g=document.getElementById('ghost');g.style.left=dX+'px';g.style.top=dY+'px';
  if(activeTool&&(activeTool.id==='brush'||activeTool.id==='sparkle'||activeTool.id==='pet')){
    const dx2=dX-lastSpX,dy2=dY-lastSpY;
    if(Math.sqrt(dx2*dx2+dy2*dy2)>18){spawnSpark(dX,dY);lastSpX=dX;lastSpY=dY;}
  }
}
function up(){
  if(!dragging)return;dragging=false;
  const g=document.getElementById('ghost');g.classList.remove('on');
  if(activeTool){
    document.getElementById('tool_'+activeTool.id)?.classList.remove('on');
    if(overCreature(dX,dY)) doAction(activeTool.id);
    activeTool=null;
  }
  lastSpX=lastSpY=-999;
}

function overCreature(x,y){
  const s=document.getElementById('stage');if(!s)return false;
  const r=s.getBoundingClientRect();const pad=42;
  return x>r.left-pad&&x<r.right+pad&&y>r.top-pad&&y<r.bottom+pad;
}
function spawnSpark(x,y){
  const el=document.createElement('div');el.className='sp';
  el.textContent=SPARKLE_ICONS[Math.floor(Math.random()*SPARKLE_ICONS.length)];
  el.style.left=x+'px';el.style.top=y+'px';el.style.fontSize=(.55+Math.random()*.7)+'rem';
  document.body.appendChild(el);setTimeout(()=>el.remove(),950);
}

//  ACTIONS
// ═══════════════════════════════════════════
const PET_MSGS=["Ooh that feels so nice! 🥰","More please! 💕","You have the best hands! ✨","So good! 😊","Best day ever! 🌟"];

function doAction(type){
  if(appState.sleeping&&type!=='pet'){speak("Shhh… sleeping! Pet me first 😴");playCareSound('no');return;}
  const d=appState.lore;
  let msg='';
  if(type==='pet'&&appState.sleeping){
    appState.sleeping=false;removeSleepZ();speak("Yawn… good morning! 😊");hearts('💕',6);playCareSound('pet');return;
  }
  switch(type){
    case 'pet': msg=PET_MSGS[Math.floor(Math.random()*PET_MSGS.length)];reactPet();playCareSound('pet');break;
    case 'feed': msg=d.moods.feed;reactFeed();playCareSound('feed');break;
    case 'brush': msg=d.furry?d.moods.brush:d.moods.sparkle;if(msg==='N/A') msg='Feeling fresh! ✨';reactBrush();playCareSound('brush');break;
    case 'cuddle': appState.sleeping=true;addSleepZ();msg=d.sleepMsg;reactCuddle();playCareSound('cuddle');break;
    case 'acc': return;
  }
  speak(msg);hearts(HEART_ICONS[type]||'💕',7);
  appState.happy=Math.min(100,appState.happy+(THAPPY[type]||8));
  updateHappy();
  if(appState.happy>=80){const he=document.getElementById('heartEyes');if(he){he.style.display='block';setTimeout(()=>he.style.display='none',2500);}}
}

const speechEl=document.getElementById('speech');
let speechT=null;
function speak(txt){
  const stage=document.getElementById('stage');if(!stage)return;
  speechEl.textContent=txt;
  const r=stage.getBoundingClientRect();
  speechEl.style.left=Math.max(8,r.left-8)+'px';
  speechEl.style.top=Math.max(68,r.top-72)+'px';
  speechEl.classList.add('show');clearTimeout(speechT);
  speechT=setTimeout(()=>speechEl.classList.remove('show'),3500);
}

function hearts(icon,n){
  const stage=document.getElementById('stage');if(!stage)return;
  const r=stage.getBoundingClientRect();
  for(let i=0;i<n;i++) setTimeout(()=>{
    const el=document.createElement('div');el.className='heart';
    el.style.cssText=`left:${r.left+20+Math.random()*(r.width-40)}px;top:${r.top+18+Math.random()*(r.height*.48)}px`;
    el.textContent=icon;document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
  },i*125);
}

// ── ACC ──
function buildAccPicker(){
  const row = document.getElementById('accRow');
  row.innerHTML = '';
  const accs = getCreatureAccs();
  accs.forEach(a => {
    const btn = document.createElement('div');
    const isOn = appState.accSet && appState.accSet.has(a.id);
    btn.className = 'acc-opt' + (isOn ? ' on' : '');
    btn.title = a.label;
    btn.innerHTML = `
      <svg viewBox="0 0 60 60" width="62" height="62" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible">
        <rect width="60" height="60" rx="8" fill="rgba(255,255,255,.05)"/>
        <g transform="scale(1) translate(0,0)">${a.preview}</g>
      </svg>
      <div class="acc-opt-label">${a.label}</div>`;
    btn.onclick = () => toggleAccItem(a);
    row.appendChild(btn);
  });
  // Remove all button
  const rem = document.createElement('div');
  rem.className = 'acc-opt';
  rem.style.gridColumn = 'span 4';
  rem.innerHTML = `<div style="display:flex;align-items:center;gap:6px;padding:4px 12px">
    <span style="font-size:.9rem">🗑️</span>
    <span style="font-family:'Baloo 2',cursive;font-size:.6rem;font-weight:800;color:#ff8888">Remove All Accessories</span>
  </div>`;
  rem.onclick = () => removeAllAcc();
  row.appendChild(rem);
}

function toggleAcc(){ document.getElementById('accPick').classList.toggle('show'); }

function toggleAccItem(accDef){
  if(!appState.accSet) appState.accSet = new Set();
  const cSvg = document.getElementById('cSvg');
  if(!cSvg) return;

  if(appState.accSet.has(accDef.id)){
    // Remove this accessory
    appState.accSet.delete(accDef.id);
    const existing = document.getElementById('acc_' + accDef.id);
    if(existing) existing.remove();
    // Also try class-based removal for items without proper id
    cSvg.querySelectorAll('[id="acc_'+accDef.id+'"]').forEach(e=>e.remove());
  } else {
    // Add this accessory
    appState.accSet.add(accDef.id);
    const svgStr = accDef.svg(appState.color || '#ffb3d9');
    const ns = 'http://www.w3.org/2000/svg';
    const tmp = document.createElementNS(ns, 'g');
    tmp.innerHTML = svgStr;
    // Move all children into the SVG
    const child = tmp.firstElementChild;
    if(child) cSvg.appendChild(child);
    // Speak and react
    speak(appState.lore ? appState.lore.moods.acc || "I love it! 🥰" : "Looking great! 🥰");
    hearts('🎉', 4);
    playCareSound('acc');
    appState.happy = Math.min(100, appState.happy + 5);
    updateHappy();
  }
  buildAccPicker();
}

function removeAllAcc(){
  if(!appState.accSet) return;
  const cSvg = document.getElementById('cSvg');
  if(cSvg) cSvg.querySelectorAll('.acc-item, [id^="acc_"]').forEach(e => e.remove());
  appState.accSet = new Set();
  speak("Back to natural look! 😊");
  buildAccPicker();
}

// Keep appState.acc for compatibility but use accSet for stacking
function applyAcc(accDef){ toggleAccItem(accDef); }
function removeAcc(){ removeAllAcc(); }

// ═══════════════════════════════════════════
//  CARE SOUND ENGINE
// ═══════════════════════════════════════════
let careCtx=null;

function getCareCtx(){
  if(!careCtx) careCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(careCtx.state==='suspended') careCtx.resume();
  return careCtx;
}

function careTone(freq,type,start,dur,vol,ctx){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,start);
  g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(.001,start+dur);
  o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+dur+.05);
}

function careSlide(f1,f2,type,start,dur,vol,ctx){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(f1,start);o.frequency.linearRampToValueAtTime(f2,start+dur);
  g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(.001,start+dur);
  o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+dur+.05);
}

function playCareSound(type){
  try{
    const ctx=getCareCtx();
    const t=ctx.currentTime;
    if(type==='pet'){
      // Soft warm purr-like tones
      careTone(523,'sine',t,.18,.25,ctx);
      careTone(659,'sine',t+.1,.18,.2,ctx);
      careTone(784,'sine',t+.2,.22,.18,ctx);
      careTone(1047,'sine',t+.3,.25,.15,ctx);
    } else if(type==='feed'){
      // Munching crunch - short percussive bursts
      [0,.1,.2,.3].forEach((dt,i)=>{
        careTone(220+i*30,'sawtooth',t+dt,.06,.35,ctx);
        careTone(440+i*20,'square',t+dt,.04,.15,ctx);
      });
      careTone(523,'sine',t+.4,.2,.2,ctx);
      careTone(784,'sine',t+.5,.2,.18,ctx);
    } else if(type==='brush'){
      // Gentle whoosh-sparkle
      careSlide(800,400,'sawtooth',t,.15,.12,ctx);
      [.12,.24,.36].forEach(dt=>{
        careTone(1047+Math.random()*200,'sine',t+dt,.1,.08,ctx);
      });
      careTone(1568,'sine',t+.4,.25,.1,ctx);
    } else if(type==='cuddle'){
      // Soft lullaby notes
      [523,494,440,392].forEach((f,i)=>{
        careTone(f,'sine',t+i*.25,.3,.18,ctx);
      });
    } else if(type==='no'){
      // Soft thud - rejection
      careSlide(300,180,'sine',t,.2,.2,ctx);
    } else if(type==='happy'){
      // Happy fanfare
      [523,659,784,1047].forEach((f,i)=>{
        careTone(f,'square',t+i*.07,.18,.3,ctx);
      });
    } else if(type==='acc'){
      // Sparkle jingle
      [1047,1319,1568,2093].forEach((f,i)=>{
        careTone(f,'sine',t+i*.06,.15,.2,ctx);
      });
    }
  }catch(e){}
}

window.addEventListener('message',e=>{
  if(e.data?.type==='initCreature') initCreature(e.data.name,e.data.color,e.data.word,e.data.happiness);
});
window.addEventListener('load',()=>initCreature('Fluffkin','#ffb3d9','pounce',50));
